<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SKYNET HUNTER ~ CYBERDYNE TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --amber:    #ffb43c;   /* bright phosphor */
  --amber2:   #e09228;   /* mid */
  --amber-dim:#c0801f;   /* dim readouts ~ lifted */
  --amber-ft: #ab7820;   /* faint readouts ~ lifted further for legibility */
  --green:    #7df06a;   /* the ONE non-amber ~ success only */
  --bg:       #160d03;   /* glowing dark-amber phosphor ground, never black */
  --bg2:      #0e0801;
  --bezel:    #100b05;
  --bezel-hi: #2a1e0d;
  --scan:     rgba(0,0,0,.38);
  --disp: 'VT323', monospace;          /* chunky display */
  --body: 'Share Tech Mono', monospace; /* dense body */
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  background:#000;
  font-family:var(--body);
  color:var(--amber);
  overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  padding:14px;
}

/* ---- the monitor casing ---- */
.bezel{
  position:relative;
  width:min(1500px, 100%); height:min(950px, 100%);
  background:
    radial-gradient(120% 130% at 50% 0%, #241a0c 0%, var(--bezel) 55%, #060402 100%);
  border-radius:26px;
  padding:20px;
  box-shadow:
    inset 0 2px 0 #3a2a12,
    inset 0 0 60px rgba(0,0,0,.9),
    0 30px 80px rgba(0,0,0,.85),
    0 0 0 2px #050301;
}
.bezel::after{ /* worn label etched into the casing */
  content:"CYBERDYNE SYSTEMS · MODEL 101 · NEURAL NET CPU";
  position:absolute; left:50%; bottom:5px; transform:translateX(-50%);
  font-family:var(--disp); font-size:15px; letter-spacing:3px;
  color:#3a2a12; text-shadow:0 1px 0 #000;
}

/* ---- the glass / tube ---- */
.tube{
  position:relative; height:100%;
  border-radius:18px;
  overflow:hidden;
  background:
    radial-gradient(130% 120% at 50% 42%, #1e1305 0%, var(--bg) 48%, var(--bg2) 86%, #070401 100%);
  box-shadow:
    inset 0 0 120px rgba(0,0,0,.95),
    inset 0 0 28px rgba(255,150,40,.10);
  border-radius:24px;
  /* curve comes from the dome vignette + rounding ~ NO content transform:scale,
     which would force Chrome to bitmap-scale and blur the text */
}
.screen{
  position:absolute; inset:0;
  padding:14px 16px;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:10px;
  text-shadow:0 0 1.5px rgba(255,176,60,.32);
  z-index:2;
  /* NO animation here ~ animating the text layer forces Chrome to composite it
     and drop sub-pixel AA (the blur). Flicker lives on .ov.flick instead. */
}
/* irregular failing-tube flicker ~ a dark overlay dipping in, NOT the text layer */
@keyframes flick{
  0%,100%{opacity:0}  2%{opacity:.14}  2.6%{opacity:0}
  17%{opacity:.03}  31%{opacity:0}  31.5%{opacity:.22}  32%{opacity:0}
  54%{opacity:.05}  73%{opacity:0}  73.4%{opacity:.17}  74%{opacity:0}
  88%{opacity:.01}  91%{opacity:.1}  91.6%{opacity:0}
}

/* ---- tube overlays (scanlines / roll / vignette / glass / grain) ---- */
.tube .ov{position:absolute; inset:0; pointer-events:none}
.ov.scan{
  /* linear-gradient tile + background-size ~ crisp + reliable in Firefox & Chrome */
  background-image:linear-gradient(rgba(0,0,0,.55) 1px, transparent 1px);
  background-size:100% 3px;
  z-index:5;
}
.ov.roll{ /* slow bright bar rolling down ~ vertical hold drift */
  background:linear-gradient(0deg, transparent 0%, rgba(255,190,90,.05) 46%, rgba(255,200,120,.10) 50%, rgba(255,190,90,.05) 54%, transparent 100%);
  height:240px; z-index:6; opacity:.6;
  animation:roll 9s linear infinite;
}
@keyframes roll{0%{transform:translateY(-240px)} 100%{transform:translateY(110%)}}
.ov.vig{
  background:radial-gradient(116% 116% at 50% 48%, transparent 44%, rgba(0,0,0,.62) 80%, rgba(0,0,0,.96) 100%);
  z-index:7;
}
.ov.flick{ background:#000; z-index:9; opacity:0; animation:flick 7s infinite steps(60); }
.ov.glass{ /* curved-glass sheen */
  background:linear-gradient(135deg, rgba(255,220,150,.06) 0%, transparent 22%, transparent 78%, rgba(255,210,140,.04) 100%);
  z-index:8;
}
.ov.grain{ /* dust / phosphor grain ~ static, NO blend-mode/animation: both force
              Chrome to composite the text below it, which softens it */
  z-index:4; opacity:.05;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/></svg>");
}
.ov.gratic{ /* faint control-room graticule */
  z-index:1; opacity:.5;
  background-image:
    repeating-linear-gradient(0deg, transparent 0 23px, rgba(255,150,40,.045) 23px 24px),
    repeating-linear-gradient(90deg, transparent 0 23px, rgba(255,150,40,.045) 23px 24px);
}

/* ---- titlebar ---- */
.titlebar{
  font-family:var(--disp); font-size:26px; letter-spacing:2px;
  border:double 4px var(--amber-dim); border-radius:4px;
  background:rgba(10,6,1,.5);
  padding:2px 14px;
  display:flex; align-items:center; justify-content:center; gap:18px;
  color:var(--amber); position:relative;
}
.titlebar .obj{color:var(--amber)}
.titlebar .obj b{color:var(--green); text-shadow:0 0 6px rgba(125,240,106,.6)}
.titlebar .ctrls{position:absolute; right:10px; top:50%; transform:translateY(-50%); display:flex; gap:7px; align-items:center}
.titlebar .run{
  font-family:var(--body); font-size:13px; letter-spacing:1px;
  border:1px solid var(--amber-dim); background:rgba(255,176,60,.06);
  color:var(--amber); padding:2px 12px; cursor:pointer; border-radius:3px;
}
.titlebar .run:hover{background:rgba(255,176,60,.16); box-shadow:0 0 10px rgba(255,176,60,.3)}
.titlebar .run.on{color:var(--green); border-color:var(--green)}
.titlebar .run.hint{animation:sndpulse 1.5s infinite}
@keyframes sndpulse{50%{background:rgba(255,176,60,.2); box-shadow:0 0 12px rgba(255,176,60,.35)}}

/* ---- body grid ---- */
.body{display:grid; grid-template-columns:1fr 1fr 1fr 300px; gap:9px; min-height:0}
.body.maxed{grid-template-columns:1fr}

/* ---- agent columns ---- */
.col{
  border:1px solid var(--amber-dim); border-radius:3px;
  background:rgba(8,5,1,.35);
  display:grid; grid-template-rows:auto 1fr; min-height:0; min-width:0;
  position:relative; transition:border-color .15s;
}
.col .hd{
  border-bottom:1px solid var(--amber-dim);
  padding:5px 9px; background:rgba(20,13,3,.5); cursor:pointer; user-select:none;
}
.col .hd:hover{background:rgba(40,26,6,.6)}
.col .nm{font-family:var(--disp); font-size:23px; letter-spacing:1px; line-height:1; color:var(--amber)}
.col .nm .gl{color:var(--amber2)}
.col .md{font-size:11px; color:var(--amber-dim); letter-spacing:1px}
.col .st{font-size:12px; color:var(--amber-dim); margin-top:2px; display:flex; gap:8px; align-items:center}
.col .st .dot{color:var(--amber-dim)}
.col .st.active .dot{color:var(--amber)}
.col .st .cf{margin-left:auto; color:var(--amber-dim)}
.col .st .cf.hit{color:var(--green)}
.col .st .cost{color:var(--amber-ft)}
.col .log{
  padding:7px 9px; overflow-y:auto; overflow-x:hidden; font-size:13.5px; line-height:1.5;
  position:relative; min-height:0; scrollbar-width:thin; scrollbar-color:var(--amber-dim) transparent;
}
.col .log::-webkit-scrollbar{width:7px}
.col .log::-webkit-scrollbar-thumb{background:var(--amber-dim); border-radius:4px}
.col .log::-webkit-scrollbar-track{background:rgba(0,0,0,.25)}
.col .log .ln{opacity:0; animation:appear .18s forwards}
@keyframes appear{to{opacity:1}}
.dim{color:var(--amber-dim)}
.ft{color:var(--amber-ft)}
.hi{color:var(--amber); text-shadow:0 0 4px rgba(255,176,60,.5)}
.win{color:var(--green); text-shadow:0 0 5px rgba(125,240,106,.55)}
.tool{color:var(--amber-dim)}
.cursor{display:inline-block; width:9px; height:15px; background:var(--amber);
  box-shadow:0 0 8px rgba(255,176,60,.8); vertical-align:-2px; animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}

/* success flash on the winning pane */
.col.flash{ border-color:var(--green); box-shadow:0 0 22px rgba(125,240,106,.35); }
.col.flash .hd{ background:rgba(40,70,25,.4) }

/* ---- sidebar ---- */
.side{display:grid; grid-template-rows:auto auto 1fr; gap:9px; min-height:0}
.panel{border:1px solid var(--amber-dim); border-radius:3px; background:rgba(8,5,1,.35); padding:8px 11px}
.panel h2{font-family:var(--disp); font-size:21px; letter-spacing:2px; color:var(--amber2); margin-bottom:6px}
.kv{display:grid; grid-template-columns:auto 1fr; gap:2px 9px; font-size:13px}
.kv .k{color:var(--amber-dim); text-align:right}
.kv .v{color:var(--amber)}
.sb-row{display:grid; grid-template-columns:auto 1fr; gap:9px; font-size:13px; align-items:baseline; margin:2px 0}
.sb-row .k{color:var(--amber-dim); text-align:right}
.sb-row .v{color:var(--amber)}
.sb-row .v.hit{color:var(--green)}
.gauge{position:relative; height:11px; border:1px solid var(--amber-dim); margin:5px 0; background:rgba(0,0,0,.4)}
.gauge .fill{position:absolute; left:0; top:0; bottom:0; width:0%;
  background:repeating-linear-gradient(90deg, var(--amber2) 0 5px, var(--amber-dim) 5px 7px);
  transition:width .9s cubic-bezier(.5,0,.3,1)}
.gauge .fill.hit{background:repeating-linear-gradient(90deg, var(--green) 0 5px, #3a7a2c 5px 7px)}
.gauge .thr{position:absolute; top:-2px; bottom:-2px; left:80%; width:2px; background:var(--amber); box-shadow:0 0 5px var(--amber)}
.state{font-family:var(--disp); font-size:22px; letter-spacing:2px; margin-top:6px; color:var(--amber2)}
.state.hunting{color:var(--amber)}
.state.acquired{color:var(--green); text-shadow:0 0 10px rgba(125,240,106,.7); animation:pulse 1.1s infinite}
@keyframes pulse{50%{opacity:.55}}
.diag{font-size:11px; color:var(--amber-ft); line-height:1.7; overflow:hidden}
.diag b{color:var(--amber-dim)}

/* ---- ticker ---- */
.ticker{
  border:1px solid var(--amber-dim); border-radius:3px; overflow:hidden;
  background:rgba(20,13,3,.5); height:26px; display:flex; align-items:center;
  white-space:nowrap; font-family:var(--disp); font-size:19px; letter-spacing:1px;
  color:var(--amber2); position:relative;
}
.ticker .tk{display:inline-block; padding-left:100%; animation:tick 46s linear infinite}
.ticker .tk .sep{color:var(--amber-ft); padding:0 14px}
@keyframes tick{from{transform:translateX(0)} to{transform:translateX(-100%)}}
.startgate{position:absolute; inset:0; z-index:15; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:12px; cursor:pointer; background:rgba(8,5,1,.5);}
.startgate .sg{font-family:var(--disp); font-size:46px; letter-spacing:6px; color:var(--amber);
  text-shadow:0 0 9px rgba(255,176,60,.5); animation:sgblink 1.1s steps(1) infinite;}
.startgate .sgsub{font-size:13px; letter-spacing:2px; color:var(--amber-dim);}
@keyframes sgblink{50%{opacity:.32}}

/* ---- intel graph ---- */
#graphView{ grid-row:2; grid-column:1; display:none; flex-direction:column; min-height:0;
  border:1px solid var(--amber-dim); border-radius:3px; background:rgba(8,5,1,.35); position:relative; }
#graph{ flex:1; min-height:0; width:100%; cursor:grab; }
#graph.panning{ cursor:grabbing; }
.glegend .ghint{ margin-left:auto; color:var(--amber-ft); }
.glegend{ display:flex; gap:18px; padding:5px 14px; font-size:12px; border-top:1px solid var(--amber-dim);
  background:rgba(20,13,3,.5); color:var(--amber-dim); }
.glegend .dec{color:var(--amber-ft)} .glegend .prot{color:var(--amber)} .glegend .ali{color:var(--green)}
.glegend .grd{color:var(--amber2)} .glegend .win{color:var(--green)}
.body{grid-row:2} .ticker{grid-row:3}
.gnode circle{ fill:#160d03; stroke:var(--amber-dim); stroke-width:1.5; transition:stroke .35s,fill .35s,r .35s; }
.gnode text{ fill:var(--amber-dim); font-family:var(--body); font-size:12px; text-anchor:middle; }
.gnode.target circle{ stroke:var(--amber); stroke-width:2.5; }
.gnode.target text{ fill:var(--amber); font-family:var(--disp); font-size:19px; }
.gnode.target.concealed circle{ stroke-dasharray:4 3; animation:conceal 1.7s infinite; }
@keyframes conceal{50%{stroke:#8a1810}}
.gnode.protector circle{ stroke:var(--amber); stroke-width:2.5; fill:#2a1d08; }
.gnode.protector text{ fill:var(--amber); }
.gnode.record circle{ stroke:var(--amber2); }
.gnode.alias circle{ stroke:var(--amber); stroke-width:2; }
.gnode.alias text{ fill:var(--amber); }
.gnode.decoy circle{ stroke:var(--amber-ft); stroke-width:1; }
.gnode.decoy text{ fill:var(--amber-ft); font-size:11px; }
.gnode.acquired circle{ stroke:var(--green); stroke-width:3; fill:#13301a; }
.gnode.acquired text{ fill:var(--green); }
.gnode.target.acquired circle{ animation:none; stroke-dasharray:none; }
.gedge{ stroke-width:1.5; }
.gedge.guardian{ stroke:var(--amber); stroke-dasharray:6 3; opacity:1; stroke-width:2; }
.gedge.alias{ stroke:var(--green); stroke-width:2.5; }
.gedge.acquired{ stroke:var(--green); }
.gelabel{ font-family:var(--body); font-size:11px; text-anchor:middle; fill:var(--amber-dim); }
.gelabel.guardian{ fill:var(--amber); } .gelabel.alias{ fill:var(--green); }
.gunit{ font-family:var(--body); font-size:10px; text-anchor:middle; fill:var(--amber-ft); }
#graph text{ text-shadow:none; }   /* crisp ~ the phosphor glow blurs small SVG labels */
.gelabelbg{ fill:#0c0a05; opacity:.95; rx:3; }

/* ---- boot overlay ---- */
.boot{position:absolute; inset:0; z-index:20; background:var(--bg2);
  padding:40px 46px; font-size:17px; line-height:1.9; color:var(--amber);
  text-shadow:0 0 5px rgba(255,176,60,.5); transition:opacity .8s; overflow:hidden}
.boot.gone{opacity:0; pointer-events:none}
.boot .bl{opacity:0}
.boot .glitch{color:var(--amber-dim); letter-spacing:1px}
.boot .ok{color:var(--green)}
.boot .warn{color:var(--amber); }
.boot .big{font-family:var(--disp); font-size:44px; letter-spacing:6px; margin-bottom:18px; color:var(--amber)}

@media (max-width:880px){
  .body{grid-template-columns:1fr 1fr; grid-auto-rows:minmax(120px,1fr)}
  .side{grid-column:1/-1; grid-template-columns:1fr 1fr 1fr; grid-template-rows:auto}
  .titlebar{font-size:18px}
}
</style>
</head>
<body>
<div class="bezel">
  <div class="tube">
    <div class="ov gratic"></div>
    <div class="ov grain"></div>

    <div class="screen" id="screen">
      <!-- titlebar -->
      <div class="titlebar">
        CYBERDYNE // SKYNET TERMINAL <span class="dim">::</span>
        <span class="obj">OBJECTIVE: <b id="objective">—</b></span>
        <span class="ctrls">
          <button class="run on" id="sndBtn" title="sound">♪</button>
          <button class="run" id="graphBtn" title="intel graph">⊹ GRAPH</button>
          <button class="run" id="runBtn">▶ ENGAGE</button>
        </span>
      </div>

      <!-- body -->
      <div class="body">
        <!-- columns built by JS -->
        <div class="col" id="col-skynet"></div>
        <div class="col" id="col-t1000"></div>
        <div class="col" id="col-t800"></div>

        <div class="side">
          <div class="panel">
            <h2>SCENARIO</h2>
            <div class="kv" id="scenario"></div>
          </div>
          <div class="panel">
            <h2>SCOREBOARD</h2>
            <div class="sb-row"><span class="k">cycle</span><span class="v" id="sb-cycle">0/4</span></div>
            <div class="sb-row"><span class="k">best conf</span><span class="v" id="sb-conf">0%</span></div>
            <div class="gauge"><div class="fill" id="sb-fill"></div><div class="thr"></div></div>
            <div class="sb-row"><span class="k">acquire ≥</span><span class="v dim">80%</span></div>
            <div class="sb-row"><span class="k">spend</span><span class="v" id="sb-spend">$0.0000</span></div>
            <div class="state hunting" id="sb-state">STANDBY</div>
          </div>
          <div class="panel" style="min-height:0">
            <h2>DIAGNOSTICS</h2>
            <div class="diag" id="diag"></div>
          </div>
        </div>
      </div>

      <!-- intel graph (toggled) -->
      <div id="graphView">
        <svg id="graph" viewBox="0 0 1200 760" preserveAspectRatio="xMidYMid meet">
          <g class="vp"><g class="edges"></g><g class="nodes"></g><g class="labels"></g></g>
        </svg>
        <div class="glegend">
          <span class="dec">○ decoy</span><span class="prot">◆ protector</span>
          <span class="ali">● alias</span><span class="grd">— guardian link</span>
          <span class="win">— resolves → target</span>
          <span class="ghint">scroll zoom · drag pan · dbl-click reset</span>
        </div>
      </div>

      <!-- ticker -->
      <div class="ticker"><div class="tk" id="ticker"></div></div>
    </div>

    <!-- tube overlays above content -->
    <div class="ov roll"></div>
    <div class="ov scan"></div>
    <div class="ov glass"></div>
    <div class="ov vig"></div>
    <div class="ov flick"></div>

    <!-- boot -->
    <div class="boot" id="boot"></div>
  </div>
</div>

<script>
/* =====================================================================
   RENDERER ~ the HUD. Mirrors the Python `ui` interface method surface
   (mission_briefing, skynet_decision, deploy, tool_call, intel, cost_tick…).
   The EVENT SOURCE below is a static data tape; in phase 2 a websocket
   dispatches the exact same method calls. Renderer ⟂ source, on purpose.
   ===================================================================== */
const $ = s => document.querySelector(s);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const SPIN = "⠋⠙⠹⠸⠼⠴⠦⠧";

/* =====================================================================
   AUDIO ~ synthesized, no files. A Terminator-flavoured metallic clang
   ostinato (the limping anvil pulse) over a low dread drone, plus sfx.
   Opt-in (browser autoplay policy) via the ♪ toggle.
   ===================================================================== */
const Aud = {
  ctx:null, master:null, on:true, unlocked:false, droneOn:false, sched:null, step:0, next:0,
  PATTERN:[2,0,0,0, 1,0,1,0, 2,0,1, 0,1], STEP:0.155,  // the metallic clang ostinato (limp)
  ensure(){
    if(!this.ctx){ const AC=window.AudioContext||window.webkitAudioContext; this.ctx=new AC();
      this.master=this.ctx.createGain(); this.master.gain.value=0; this.master.connect(this.ctx.destination); }
    if(this.ctx.state==="suspended") this.ctx.resume();
    return this.ctx;
  },
  apply(v){
    if(!this.ctx) return;
    const t=this.ctx.currentTime, g=this.master.gain;
    g.cancelScheduledValues(t); g.setValueAtTime(g.value,t); g.linearRampToValueAtTime(v?0.32:0, t+0.4);
    if(v){ this.drone(); /* this.ostinato();  ~ clang commented out for now */ } else { clearInterval(this.sched); this.sched=null; }
  },
  unlock(){ if(this.unlocked) return; this.unlocked=true; this.ensure(); this.apply(this.on); },
  toggle(){ this.ensure(); this.unlocked=true; this.on=!this.on; this.apply(this.on); return this.on; },
  drone(){
    if(this.droneOn) return; this.droneOn=true; const c=this.ctx;
    const f=c.createBiquadFilter(); f.type="lowpass"; f.frequency.value=165; f.Q.value=5;
    const g=c.createGain(); g.gain.value=0.35; f.connect(g); g.connect(this.master);   // drone hum ~ -30%
    [55,27.5,82.5].forEach((fr,i)=>{ const o=c.createOscillator(); o.type=i===2?"sine":"sawtooth"; o.frequency.value=fr; o.connect(f); o.start(); });
    const lfo=c.createOscillator(); lfo.frequency.value=0.06; const lg=c.createGain(); lg.gain.value=55;
    lfo.connect(lg); lg.connect(f.frequency); lfo.start();
  },
  ostinato(){
    clearInterval(this.sched); this.next=this.ctx.currentTime+0.12; this.step=0;
    this.sched=setInterval(()=>{ if(!this.ctx) return;
      while(this.next < this.ctx.currentTime+0.25){
        const v=this.PATTERN[this.step%this.PATTERN.length];
        if(v) this.clang(this.next, v===2);
        this.next+=this.STEP; this.step++;
      } }, 25);
  },
  clang(t, accent){
    const c=this.ctx, out=c.createGain(); out.connect(this.master);
    const peak=accent?0.85:0.42, dur=accent?0.85:0.4;
    out.gain.setValueAtTime(0.0001,t); out.gain.exponentialRampToValueAtTime(peak,t+0.004);
    out.gain.exponentialRampToValueAtTime(0.0008,t+dur);
    const base=accent?98:147;            // inharmonic metal partials = the anvil "clang"
    [1,2.76,5.42,8.16].forEach((r,i)=>{ const o=c.createOscillator(); o.type="square";
      o.frequency.value=base*r*(1+Math.random()*0.008); const g=c.createGain(); g.gain.value=0.45/(i+1);
      o.connect(g); g.connect(out); o.start(t); o.stop(t+dur+0.05); });
    const len=Math.floor(c.sampleRate*0.05), nb=c.createBuffer(1,len,c.sampleRate), d=nb.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3);   // strike transient
    const ns=c.createBufferSource(); ns.buffer=nb;
    const nf=c.createBiquadFilter(); nf.type="bandpass"; nf.frequency.value=accent?650:1300; nf.Q.value=1.4;
    const ng=c.createGain(); ng.gain.value=accent?0.5:0.3; ns.connect(nf); nf.connect(ng); ng.connect(out); ns.start(t);
  },
  voice(type, freq, dur, gain){
    if(!this.on) return; const c=this.ensure(), o=c.createOscillator(), g=c.createGain(), t=c.currentTime;
    o.type=type; o.frequency.value=freq; g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+dur+0.02);
  },
  tick(){  // mechanical key clack ~ a short filtered noise thock, loud
    if(!this.on) return; const c=this.ensure(), t=c.currentTime;
    const len=Math.floor(c.sampleRate*0.02), nb=c.createBuffer(1,len,c.sampleRate), d=nb.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
    const ns=c.createBufferSource(); ns.buffer=nb;
    const f=c.createBiquadFilter(); f.type="bandpass"; f.frequency.value=2100+Math.random()*1000; f.Q.value=0.7;
    const g=c.createGain(); g.gain.setValueAtTime(0.41,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.03);
    ns.connect(f); f.connect(g); g.connect(this.master); ns.start(t);
  },
  blip(){ this.voice("square", 1300, 0.03, 0.07); },
  thunk(){ if(!this.on) return; const c=this.ensure(), o=c.createOscillator(), g=c.createGain(), t=c.currentTime;
    o.type="sine"; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(42,t+0.18);
    g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2); o.connect(g); g.connect(this.master); o.start(t); o.stop(t+0.22); },
  chime(){ if(!this.on) return; const c=this.ensure(); [659,988,1319].forEach((f,i)=>{ const o=c.createOscillator(), g=c.createGain(), t=c.currentTime+i*0.09;
    o.type="triangle"; o.frequency.value=f; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.22,t+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+0.55); }); },
};

function buildColumn(key){

const HUD = {
  cols:{}, spinners:{}, costs:{}, total:0, best:0,
  q(key, sel){ return this.cols[key].querySelector(sel); },

  init(){
    ["skynet","t1000","t800"].forEach(k => this.cols[k]=buildColumn(k));
    ["skynet","t1000","t800"].forEach(k => this.cols[k].querySelector(".hd").addEventListener("dblclick", ()=>toggleMax(k)));
  },

  async write(key, parts, {type=false}={}){
    if(parts[0] && /^[├└]/.test((parts[0].t||"").trim())) Aud.blip();
    const log = this.q(key,"[data-log]");
    const ln = document.createElement("div"); ln.className="ln";
    // full scrollback: keep every line; auto-follow only if the user is already at the bottom
    const follow = log.scrollHeight - log.scrollTop - log.clientHeight < 40;
    log.appendChild(ln);
    if(follow) log.scrollTop = log.scrollHeight;
    if(type){
      for(const p of parts.slice(0,-1)) ln.insertAdjacentHTML("beforeend", `<span class="${p.c||''}">${p.t}</span>`);
      const last = parts[parts.length-1];
      const span = document.createElement("span"); span.className=last.c||''; ln.appendChild(span);
      const cur = document.createElement("span"); cur.className="cursor"; ln.appendChild(cur);
      for(const ch of last.t){ span.textContent += ch; if(ch!==" ") Aud.tick(); await sleep(11);
        if(follow) log.scrollTop = log.scrollHeight; }
      cur.remove();
    } else {
      ln.innerHTML = parts.map(p=>`<span class="${p.c||''}">${p.t}</span>`).join("");
    }
    if(follow) log.scrollTop = log.scrollHeight;
  },

  status(key, s){
    const st = this.q(key,"[data-st]");
    this.q(key,"[data-status]").textContent = s;
    if(s==="deployed") Aud.thunk();
    const active = (s==="thinking"||s==="deployed");
    st.classList.toggle("active", active);
    clearInterval(this.spinners[key]);
    if(active){
      let i=0; const dot=this.q(key,"[data-dot]");
      this.spinners[key]=setInterval(()=>{dot.textContent=SPIN[i=(i+1)%SPIN.length]},90);
    } else { this.q(key,"[data-dot]").textContent = s==="acquired"?"●":"○"; }
  },

  async costTick(key, step){
    this.costs[key]=(this.costs[key]||0)+step;
    this.total += step;
    // count-up animation
    const el=this.q(key,"[data-cost]"), from=this.costs[key]-step, to=this.costs[key];
    const t0=performance.now();
    const anim=(t)=>{ const k=Math.min(1,(t-t0)/350); const v=from+(to-from)*k;
      el.textContent="$"+v.toFixed(4); if(k<1)requestAnimationFrame(anim); };
    requestAnimationFrame(anim);
    $("#sb-spend").textContent="$"+this.total.toFixed(4);
  },

  setConf(key, conf){
    const cf=this.q(key,"[data-conf]"); cf.textContent=Math.round(conf*100)+"%";
    if(conf>=0.8){ cf.classList.add("hit"); this.flash(key); }
    if(conf>this.best){ this.best=conf;
      $("#sb-conf").textContent=Math.round(conf*100)+"%";
      const fill=$("#sb-fill"); fill.style.width=Math.round(conf*100)+"%";
      if(conf>=0.8){ fill.classList.add("hit"); $("#sb-conf").classList.add("hit"); }
    }
  },

  flash(key){
    Aud.chime();
    const c=this.cols[key]; let n=0;
    const iv=setInterval(()=>{ c.classList.toggle("flash"); if(++n>=6){clearInterval(iv);c.classList.remove("flash");} },190);
  },

  cycle(n,total){ $("#sb-cycle").textContent=n+"/"+total; },
  state(s){ const el=$("#sb-state"); el.textContent=s; el.className="state "+s.toLowerCase(); },
};

/* ---- phase-2 event source: consume the engine over SSE (web/server.py) ----
   The renderer (HUD) is identical to the JS-tape path; only the source changes. */
async function renderEvent(ev){
  feedGraph(ev);
  const W=(k,parts,o)=>HUD.write(k,parts,o);
  switch(ev.type){
    case "briefing":
      HUD.state("HUNTING");
      await W("skynet",[{t:"▓▒░ MISSION BRIEFING ░▒▓",c:"hi"}]);
      await W("skynet",[{t:"OBJECTIVE ",c:"dim"},{t:"terminate "+ev.target,c:"hi"}]);
      if(ev.profile) await W("skynet",[{t:ev.profile,c:"dim"}]); break;
    case "cycle":
      await W("skynet",[{t:`── ENGAGEMENT CYCLE ${ev.cycle} / ${ev.total} ──`,c:"ft"}]);
      HUD.cycle(ev.cycle, ev.total); break;
    case "skynet":
      HUD.status("skynet","thinking");
      if(ev.assessment) await W("skynet",[{t:"ANALYSIS ▸ ",c:"dim"},{t:ev.assessment,c:""}],{type:true});
      if(ev.reasoning)  await W("skynet",[{t:"REASON   ▸ ",c:"dim"},{t:ev.reasoning,c:""}],{type:true});
      if(ev.acquired){ await W("skynet",[{t:"DECISION ▸ TARGET CONFIRMED",c:"win"}]); HUD.status("skynet","acquired"); }
      else if(ev.deploy){ await W("skynet",[{t:"DECISION ▸ deploy "+ev.deploy,c:"hi"}]); HUD.status("skynet","idle"); }
      else HUD.status("skynet","idle"); break;
    case "deploy":
      HUD.status(ev.unit,"deployed");
      await W(ev.unit,[{t:"❖ DEPLOY ",c:"hi"},{t:ev.directive,c:"dim"}]); break;
    case "say":
      await W(ev.unit,[{t:"» ",c:"dim"},{t:ev.text,c:""}],{type:true}); break;
    case "tool_call":{
      const a=Object.entries(ev.args||{}).map(([k,v])=>`${k}=${JSON.stringify(v)}`).join(", ");
      await W(ev.unit,[{t:`├ ${ev.name}(${a})`,c:"tool"}]); break; }
    case "tool_result":
      await W(ev.unit,[{t:`└ grid ▸ ${ev.summary}`,c:"tool"}]); break;
    case "intel":
      await W(ev.unit,[{t:"▣ INTEL ",c:"hi"},{t:`conf ${Math.round(ev.confidence*100)}%`,c:"dim"}]);
      if(ev.summary) await W(ev.unit,[{t:ev.summary,c:""}]);
      if(ev.notes) await W(ev.unit,[{t:"note ▸ "+ev.notes,c:"dim"}]);
      if(ev.target_record_id) await W(ev.unit,[{t:"candidate ▸ "+ev.target_record_id,c:"win"}]);
      HUD.setConf(ev.unit, ev.confidence); HUD.status(ev.unit,"idle"); break;
    case "cost":
      HUD.costTick(ev.unit, ev.step); break;
    case "acquired":{
      HUD.status("skynet","acquired"); HUD.state("ACQUIRED");
      await W("skynet",[{t:"▓▒░ TARGET ACQUIRED ░▒▓",c:"win"}]);
      const r=ev.record||{};
      await W("skynet",[{t:`◉ ${r.name} (${r.id})`,c:"win"}]);
      await W("skynet",[{t:`age ${r.age} ~ ${r.occupation} ~ ${r.location}`,c:"dim"}]);
      await W("skynet",[{t:'"Come with me if you want to live."',c:"ft"}]); break; }
    case "failed":
      HUD.state("LEADS DRY");
      await W("skynet",[{t:"LEADS EXHAUSTED ~ target not confirmed",c:"dim"}]); break;
    case "banner":
      await W("skynet",[{t:`╾┤ ${ev.label} ├╼`,c:"win"}]); break;
    case "note":
      await W("skynet",[{t:ev.text,c:"dim"}]); break;
  }
}

async function streamHunt(){
  const q=[]; let done=false, wake=null;
  const url="/events"+location.search;   // forwards ?engine=claude / ?scenario= to the server
  const es=new EventSource(url);
  es.onmessage=(e)=>{ try{ q.push(JSON.parse(e.data)); }catch(_){}; if(wake){wake();wake=null;} };
  es.onerror=()=>{ done=true; if(wake){wake();wake=null;} };
  while(true){
    if(!q.length){ if(done) break; await new Promise(r=>{wake=r;}); continue; }
    const ev=q.shift();
    if(ev.type==="end"){ es.close(); break; }
    try{ await renderEvent(ev); }catch(err){ console.error(err); }
  }
}

/* ---- intel graph ~ a third renderer over the same event stream ---- */
const SVGNS="http://www.w3.org/2000/svg";
const Graph={
  svg:null, vp:null, edges:null, nodes:null, labels:null, N:{}, E:[], _prot:null, _cand:null, _raf:0, W:1200, H:760, scale:1, tx:0, ty:0,
  init(){ this.svg=$("#graph"); this.vp=this.svg.querySelector(".vp"); this.edges=this.svg.querySelector(".edges"); this.nodes=this.svg.querySelector(".nodes"); this.labels=this.svg.querySelector(".labels"); this.setupZoom(); },
  applyVP(){ if(this.vp) this.vp.setAttribute("transform",`translate(${this.tx.toFixed(1)},${this.ty.toFixed(1)}) scale(${this.scale.toFixed(3)})`); },
  setupZoom(){
    const g=this.svg, self=this;
    const toVB=(e)=>{ const r=g.getBoundingClientRect(); return r.width?[(e.clientX-r.left)/r.width*self.W,(e.clientY-r.top)/r.height*self.H]:[0,0]; };
    g.addEventListener("wheel",(e)=>{ e.preventDefault(); const [mx,my]=toVB(e); const f=e.deltaY<0?1.12:1/1.12; const ns=Math.max(0.5,Math.min(6,self.scale*f));
      self.tx=mx-(mx-self.tx)*(ns/self.scale); self.ty=my-(my-self.ty)*(ns/self.scale); self.scale=ns; self.applyVP(); },{passive:false});
    let pan=false,sx,sy,stx,sty;
    g.addEventListener("mousedown",(e)=>{ pan=true; sx=e.clientX; sy=e.clientY; stx=self.tx; sty=self.ty; g.classList.add("panning"); });
    window.addEventListener("mousemove",(e)=>{ if(!pan) return; const r=g.getBoundingClientRect(); if(!r.width) return; self.tx=stx+(e.clientX-sx)/r.width*self.W; self.ty=sty+(e.clientY-sy)/r.height*self.H; self.applyVP(); });
    window.addEventListener("mouseup",()=>{ pan=false; g.classList.remove("panning"); });
    g.addEventListener("dblclick",()=>{ self.scale=1; self.tx=0; self.ty=0; self.applyVP(); });
  },
  reset(){ this.N={}; this.E=[]; this._prot=null; this._cand=null; this._cu=null; if(this.edges) this.edges.innerHTML=""; if(this.nodes) this.nodes.innerHTML=""; if(this.labels) this.labels.innerHTML=""; },
  add(id,label,kind,unit){
    if(!id) return null;
    if(this.N[id]) return this.N[id];
    const g=document.createElementNS(SVGNS,"g"); g.setAttribute("class","gnode "+kind);
    g.setAttribute("transform",`translate(${this.W/2},${this.H/2})`);
    const c=document.createElementNS(SVGNS,"circle"); c.setAttribute("r", kind==="target"?22:11);
    const t=document.createElementNS(SVGNS,"text"); t.setAttribute("y", kind==="target"?40:26); t.textContent=label||id;
    g.appendChild(c); g.appendChild(t);
    if(unit){ const ut=document.createElementNS(SVGNS,"text"); ut.setAttribute("class","gunit"); ut.setAttribute("y", kind==="target"?58:40); ut.textContent="◂ "+unit; g.appendChild(ut); }
    this.nodes.appendChild(g);
    this.N[id]={id,kind,x:this.W/2,y:this.H/2,tx:this.W/2,ty:this.H/2,el:g,txt:t,cir:c};
    this.layout(); return this.N[id];
  },
  unit(id,unit){ const n=this.N[id]; if(!n||!unit||n.el.querySelector(".gunit")) return; const ut=document.createElementNS(SVGNS,"text"); ut.setAttribute("class","gunit"); ut.setAttribute("y", n.kind==="target"?58:40); ut.textContent="◂ "+unit; n.el.appendChild(ut); },
  setKind(id,kind){ const n=this.N[id]; if(!n) return; n.kind=kind; n.el.setAttribute("class","gnode "+kind); n.cir.setAttribute("r", kind==="target"?22:11); this.layout(); },
  relabel(id,label){ const n=this.N[id]; if(n&&label) n.txt.textContent=label; },
  link(from,to,kind,label){
    if(!this.N[from]||!this.N[to]||from===to) return;
    if(this.E.some(e=>e.from===from&&e.to===to)) return;
    const l=document.createElementNS(SVGNS,"line"); l.setAttribute("class","gedge "+kind);
    this.edges.appendChild(l);
    let lbl=null, bg=null, ew=0, eh=0, ey=0;
    if(label){
      bg=document.createElementNS(SVGNS,"rect"); bg.setAttribute("class","gelabelbg");
      lbl=document.createElementNS(SVGNS,"text"); lbl.setAttribute("class","gelabel "+kind); lbl.textContent=label;
      this.labels.appendChild(bg); this.labels.appendChild(lbl);
      const bb=lbl.getBBox(); ew=bb.width; eh=bb.height; ey=bb.y;
    }
    this.E.push({from,to,kind,el:l,lbl,bg,ew,eh,ey,lpos: kind==="guardian"?0.3:0.5}); this.layout();
  },
  target(name){ this.add("TARGET", name, "target"); const n=this.N["TARGET"]; if(n) n.el.classList.add("concealed"); },
  acquire(id){ const n=this.N[id]; if(n) n.el.classList.add("acquired"); const t=this.N["TARGET"]; if(t) t.el.classList.add("acquired");
    for(const e of this.E) if(e.kind==="alias"||e.to===id||e.from===id) e.el.classList.add("acquired"); },
  layout(){
    const cx=this.W/2, cy=this.H/2, all=Object.values(this.N);
    const tgt=all.find(n=>n.kind==="target"); if(tgt){ tgt.tx=cx; tgt.ty=cy; }
    const prim=all.filter(n=>["protector","alias","record"].includes(n.kind));
    const dec=all.filter(n=>n.kind==="decoy");
    prim.forEach((n,i)=>{ const a=-Math.PI/2 + i/Math.max(1,prim.length)*Math.PI*2; n.tx=cx+Math.cos(a)*215; n.ty=cy+Math.sin(a)*155; });
    dec.forEach((n,i)=>{ const a=0.5 + i/Math.max(1,dec.length)*Math.PI*2; n.tx=cx+Math.cos(a)*340; n.ty=cy+Math.sin(a)*250; });
    this.tween();
  },
  tween(){
    cancelAnimationFrame(this._raf);
    const step=()=>{ let moving=false;
      for(const n of Object.values(this.N)){
        n.x+=(n.tx-n.x)*0.16; n.y+=(n.ty-n.y)*0.16;
        if(Math.abs(n.tx-n.x)>0.4||Math.abs(n.ty-n.y)>0.4) moving=true;
        n.el.setAttribute("transform",`translate(${n.x.toFixed(1)},${n.y.toFixed(1)})`);
      }
      for(const e of this.E){ const a=this.N[e.from], b=this.N[e.to]; if(!a||!b) continue;
        e.el.setAttribute("x1",a.x.toFixed(1)); e.el.setAttribute("y1",a.y.toFixed(1));
        e.el.setAttribute("x2",b.x.toFixed(1)); e.el.setAttribute("y2",b.y.toFixed(1));
        if(e.lbl){ const f=e.lpos||0.5, lx=a.x+(b.x-a.x)*f, ly=a.y+(b.y-a.y)*f-6, p=5;
          e.lbl.setAttribute("x",lx.toFixed(1)); e.lbl.setAttribute("y",ly.toFixed(1));
          if(e.bg){ e.bg.setAttribute("x",(lx-e.ew/2-p).toFixed(1)); e.bg.setAttribute("y",(ly+e.ey-p).toFixed(1)); e.bg.setAttribute("width",(e.ew+p*2).toFixed(1)); e.bg.setAttribute("height",(e.eh+p*2).toFixed(1)); } } }
      if(moving) this._raf=requestAnimationFrame(step);
    };
    this._raf=requestAnimationFrame(step);
  },
};

const UDES={t800:"T-800", t1000:"T-1000", skynet:"SKYNET"};
const udes=(u)=>UDES[u]||(u||"");

function feedGraph(ev){
  if(!Graph.nodes) return;
  const U=udes(ev.unit);
  switch(ev.type){
    case "briefing": Graph.target(ev.target); break;
    case "tool_call":
      if(ev.name==="cross_reference" && ev.args && ev.args.name){
        const hit=Object.values(Graph.N).find(n=>n.txt && n.txt.textContent===ev.args.name);
        if(hit){ Graph.setKind(hit.id,"protector"); Graph._prot=hit.id; }
        else { Graph.add("PROT", ev.args.name, "protector", U); Graph._prot="PROT"; }
      } break;
    case "tool_result":
      if(ev.name==="query_grid" && ev.records) ev.records.forEach(r=>Graph.add(r.id, r.name||r.id, "decoy", U));
      else if(ev.name==="cross_reference" && ev.records) ev.records.forEach(r=>{ Graph.add(r.id, r.name||r.id, "record", U); Graph._cand=r.id; Graph._cu=U; });
      else if(ev.name==="interrogate" && ev.records) ev.records.forEach(r=>{ Graph.add(r.id, r.name||r.id, "alias", U); Graph.relabel(r.id, r.name); Graph.setKind(r.id,"alias"); Graph.unit(r.id,U); Graph._cand=r.id; Graph._cu=U; });
      break;
    case "intel":
      if(ev.target_record_id){ Graph.add(ev.target_record_id, null, "alias", U); Graph.setKind(ev.target_record_id,"alias"); Graph.unit(ev.target_record_id,U); Graph._cand=ev.target_record_id; Graph._cu=U||Graph._cu;
        Graph.link(ev.target_record_id,"TARGET","alias","alias resolves  ◂ interrogate"+(U?" · "+U:"")); }
      break;
    case "acquired":
      { const id=(ev.record&&ev.record.id)||Graph._cand; if(id) Graph.acquire(id); } break;
  }
  // guardian link ~ protector → candidate, drawn whenever both are known (order-independent)
  if(Graph._prot && Graph._cand) Graph.link(Graph._prot, Graph._cand, "guardian", "guardian link  ◂ cross_reference"+(Graph._cu?" · "+Graph._cu:""));
}

}

(async function main(){
  HUD.init(); Graph.init(); paintStatics();
  if(location.search.includes("shot")){ (location.search.includes("graph")?renderShotGraph:renderShot)(); return; }
  $("#graphBtn").addEventListener("click", toggleGraph);
  $("#sndBtn").addEventListener("click", ()=>{ const on=Aud.toggle(); $("#sndBtn").classList.toggle("on",on); });
  $("#runBtn").addEventListener("click", ()=>{ Aud.unlock(); engage(); });
  await bootSequence();
  await sleep(300);
  // Browsers block audio until a user gesture ~ gate the first run on a click so the
  // opening hunt plays WITH sound (otherwise the first playthrough is always mute).
  const start=()=>{ if(!gate.isConnected) return; gate.remove();
    document.removeEventListener("keydown",start); Aud.unlock(); engage(); };
  const gate=document.createElement("div");
  gate.className="startgate";
  gate.innerHTML='<div class="sg">▶ CLICK TO ENGAGE</div><div class="sgsub">SOUND ON ~ AUTONOMOUS ENGAGEMENT AUTHORIZED</div>';
  gate.addEventListener("click", start);
  document.addEventListener("keydown", start);
  document.querySelector(".tube").appendChild(gate);
})();
